---
- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:
    - name: Copy WAR file to Tomcat
      ansible.builtin.copy:
        src: "target/2023MavenWebAppwithAnsible.war"
        dest: "/opt/tomcat/webapps/2023MavenWebAppwithAnsible.war"
        mode: '0644'

    - name: Restart Tomcat
      ansible.builtin.shell: |
        /opt/tomcat/bin/shutdown.sh || true
        sleep 2
        /opt/tomcat/bin/startup.sh
