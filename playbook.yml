---
- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:
    - name: Copy WAR file to Tomcat
      copy:
        src: "/target/2023MavenWebAppwithAnsible.war"
        dest: "/opt/tomcat/webapps/2023Mav
        remote_src: no

    - name: Restart Tomcat
      systemd:
        name: tomcat
        state: restarted
