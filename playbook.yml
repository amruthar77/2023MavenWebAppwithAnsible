---
- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:
    - name: Copy WAR file to Tomcat
      copy:
        src: "/var/lib/jenkins/workspace/2023MavenWebAppwithAnsible/target/2023MavenWebAppwithAnsible.war"
        dest: "/opt/tomcat/webapps/2023MavenWebAppwithAnsible.war"
        remote_src: no

    - name: Stop Tomcat
      shell: /opt/tomcat/bin/shutdown.sh

    - name: Start Tomcat
      shell: /opt/tomcat/bin/startup.sh
